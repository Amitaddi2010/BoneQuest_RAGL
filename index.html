<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BoneQuest v2 — Clinical-Grade Orthopaedic Decision Support with AI-Powered Guideline Validation, Audit Trails, and Vision Analysis.">
    <meta name="keywords" content="orthopaedic, AI, clinical, decision support, AAOS, guidelines, medical, bone, fracture, PGIMER">
    <meta name="author" content="BoneQuest Team">
    <title>BoneQuest — AI Orthopaedic Intelligence</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Fragment+Mono&family=Inter:wght@300..900&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/src/styles/design-system.css">
    <link rel="stylesheet" href="/src/styles/animations.css">
    <link rel="stylesheet" href="/src/styles/landing.css">
    <link rel="stylesheet" href="/src/styles/auth.css">
    <link rel="stylesheet" href="/src/styles/dashboard.css">
    <link rel="stylesheet" href="/src/styles/chat.css">
    <link rel="stylesheet" href="/src/styles/admin.css">
    <link rel="stylesheet" href="/src/styles/profile.css">

    <!-- Favicon -->
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔬</text></svg>">

    <!-- Navbar inline styles -->
    <style>
        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--nav-height);
            z-index: var(--z-sticky);
            border-bottom: 1px solid var(--border-subtle);
        }
        .nav-container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 var(--space-6);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-8);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            font-family: var(--font-display);
            font-size: var(--text-xl);
            font-weight: var(--weight-bold);
            color: var(--text-primary);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: var(--space-1);
        }
        .nav-link {
            padding: var(--space-2) var(--space-4);
            color: var(--text-dim);
            font-size: var(--text-sm);
            font-weight: var(--weight-medium);
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
            text-decoration: none;
        }
        .nav-link:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
        .nav-link.active { color: var(--text-primary); background: var(--accent-subtle); }
        .nav-actions {
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }
        .nav-user {
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }
        .nav-user-avatar {
            width: 34px;
            height: 34px;
            border-radius: var(--radius-full);
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: var(--weight-bold);
            font-size: var(--text-sm);
            color: white;
        }
        .nav-user-info {
            display: flex;
            flex-direction: column;
        }
        .nav-user-name {
            font-size: var(--text-sm);
            color: var(--text-primary);
            font-weight: var(--weight-medium);
        }
        .nav-user-role {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: capitalize;
        }
        .nav-logout {
            font-size: var(--text-lg);
            opacity: 0.5;
            transition: opacity var(--transition-fast);
            cursor: pointer;
        }
        .nav-logout:hover { opacity: 1; color: var(--error); }
        
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hide-mobile { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Navbar injected here -->
        <nav id="main-nav"></nav>
        
        <!-- Page content injected here -->
        <main id="page-content"></main>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
